{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold">Dashboard</h2>
  <form method="get" class="d-flex align-items-center gap-2">
    <input type="date" id="date" name="date" class="form-control form-control-sm" value="{{ selected_date|date:'Y-m-d' }}">
    <button type="submit" class="btn btn-primary btn-sm">🔍 Filter</button>
  </form>
</div>

<div class="row mb-4">
  <div class="col-md-4">
    <div class="card text-white bg-success">
      <div class="card-body">
        <h5 class="card-title">Pallets Today</h5>
        <p class="card-text fs-4">{{ pallets_today }}</p>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-dark bg-warning">
      <div class="card-body">
        <h5 class="card-title">Pallets This Month</h5>
        <p class="card-text fs-4">{{ pallets_month }}</p>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-white bg-info">
      <div class="card-body">
        <h5 class="card-title">Total Pallets</h5>
        <p class="card-text fs-4">{{ pallets_total }}</p>
      </div>
    </div>
  </div>
</div>

<div class="card mb-4">
  <div class="card-header fw-semibold">Pallets by Checker (Month)</div>
  <div class="card-body bg-white dark-mode">
    <canvas id="checkerChart"></canvas>
  </div>
</div>

<div class="row">
  <div class="col-md-6 mb-4">
    <div class="card">
      <div class="card-header fw-semibold">Status Loads (Today)</div>
      <div class="card-body bg-white dark-mode">
        <canvas id="statusDayChart"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-6 mb-4">
    <div class="card">
      <div class="card-header fw-semibold">Status Loads (Month)</div>
      <div class="card-body bg-white dark-mode">
        <canvas id="statusMonthChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const checkerData = {
    labels: [{% for c in checker_month %}'{{ c.checker__name }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Pallets',
      data: [{% for c in checker_month %}{{ c.total }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: 'rgba(54, 162, 235, 0.7)'
    }]
  };
  new Chart(document.getElementById('checkerChart'), {
    type: 'bar',
    data: checkerData,
    options: { responsive: true, maintainAspectRatio: false }
  });

  const statusDayData = {
    labels: [{% for s in loads_status_day %}'{{ s.status_load|title }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Status Today',
      data: [{% for s in loads_status_day %}{{ s.count }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: ['#28a745', '#ffc107', '#dc3545']
    }]
  };
  new Chart(document.getElementById('statusDayChart'), {
    type: 'bar',
    data: statusDayData,
    options: { responsive: true, maintainAspectRatio: false }
  });

  const statusMonthData = {
    labels: [{% for s in loads_status_month %}'{{ s.status_load|title }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Status Month',
      data: [{% for s in loads_status_month %}{{ s.count }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: ['#28a745', '#ffc107', '#dc3545']
    }]
  };
  new Chart(document.getElementById('statusMonthChart'), {
    type: 'bar',
    data: statusMonthData,
    options: { responsive: true, maintainAspectRatio: false }
  });
</script>
{% endblock %}
