{% extends 'base.html' %}
{% block content %}

<style>
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
    gap: 10px;
  }

  .btn-back {
    background-color: #6c757d;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    font-size: 0.875rem;
    text-decoration: none;
    display: inline-block;
  }
  .btn-back:hover {
    background-color: #5a6268;
  }

  .btn-dashboard {
    background-color: #6f42c1;
    color: white;
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    font-size: 0.875rem;
    cursor: pointer;
  }
  .btn-dashboard:hover {
    background-color: #5a32a3;
  }

  .btn-theme-toggle {
    background-color: #343a40;
    color: white;
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    font-size: 0.875rem;
    cursor: pointer;
  }
  .btn-theme-toggle:hover {
    background-color: #23272b;
  }

  input[type="date"] {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.875rem;
  }

  .dashboard-container {
    display: flex;
    flex-direction: column;
    gap: 40px;
    padding: 20px;
  }
  .kpi-boxes {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .kpi-card {
    padding: 20px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
    min-width: 180px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    color: white;
  }
  .kpi-card:nth-child(1) {
    background-color: #007bff;
  }
  .kpi-card:nth-child(2) {
    background-color: #28a745;
  }
  .kpi-card:nth-child(3) {
    background-color: #ffc107;
    color: #212529;
  }
  .kpi-card h3 {
    margin-bottom: 10px;
    font-size: 18px;
  }
  canvas {
    max-width: 100%;
  }
  .chart-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
  }
  .chart-box {
    flex: 1 1 300px;
    max-width: 400px;
    padding: 10px;
    background-color: #f8f9fa;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
    height: auto;
  }
  .chart-box canvas {
    width: 100% !important;
    height: 300px !important;
  }
  body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
  }
  body.dark-mode .kpi-card:nth-child(1) {
    background-color: #0056b3;
  }
  body.dark-mode .kpi-card:nth-child(2) {
    background-color: #1e7e34;
  }
  body.dark-mode .kpi-card:nth-child(3) {
    background-color: #d39e00;
    color: #212529;
  }
  body.dark-mode .chart-box {
    background-color: #1e1e1e;
    color: #e0e0e0;
  }
</style>

<div class="top-bar">
  <a href="{% url 'appointment_list' %}" class="btn-back">🔙 Back to Appointments</a>
  <form method="get" style="display: flex; align-items: center; gap: 10px;">
    <label for="date">Select a date:</label>
    <input type="date" id="date" name="date" value="{{ selected_date|date:'Y-m-d' }}">
    <button type="submit" class="btn-dashboard">🔍 Filter</button>
    <button type="button" class="btn-theme-toggle" onclick="toggleTheme()">🌓</button>
  </form>
</div>

<div class="dashboard-container">
  <h2>Dashboard</h2>

  <!-- KPIs -->
  <div class="kpi-boxes">
    <div class="kpi-card">
      <h3>Pallets Today</h3>
      <p>{{ pallets_today }}</p>
    </div>
    <div class="kpi-card">
      <h3>Pallets This Month</h3>
      <p>{{ pallets_month }}</p>
    </div>
    <div class="kpi-card">
      <h3>Total Pallets</h3>
      <p>{{ pallets_total }}</p>
    </div>
  </div>

  <!-- Pallets por Checker -->
  <h3>Pallets by Checker (Month)</h3>
  <canvas id="checkerChart"></canvas>

  <!-- Loads por Status lado a lado -->
  <div class="chart-container">
    <div class="chart-box">
      <h4>Loads by Status (Day)</h4>
      <canvas id="statusDayChart"></canvas>
    </div>
    <div class="chart-box">
      <h4>Loads by Status (Month)</h4>
      <canvas id="statusMonthChart"></canvas>
    </div>
  </div>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const checkerData = {
    labels: [{% for c in checker_month %}'{{ c.checker__name }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Pallets por Checker',
      data: [{% for c in checker_month %}{{ c.total }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: 'rgba(54, 162, 235, 0.7)'
    }]
  };
  new Chart(document.getElementById('checkerChart'), {
    type: 'bar',
    data: checkerData,
    options: { responsive: true }
  });

  const statusDayData = {
    labels: [{% for s in loads_status_day %}'{{ s.status_load|title }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Status Hoje',
      data: [{% for s in loads_status_day %}{{ s.count }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: ['#28a745', '#ffc107', '#dc3545']
    }]
  };
  new Chart(document.getElementById('statusDayChart'), {
    type: 'pie',
    data: statusDayData,
    options: { responsive: true, maintainAspectRatio: false }
  });

  const statusMonthData = {
    labels: [{% for s in loads_status_month %}'{{ s.status_load|title }}'{% if not forloop.last %}, {% endif %}{% endfor %}],
    datasets: [{
      label: 'Status Mês',
      data: [{% for s in loads_status_month %}{{ s.count }}{% if not forloop.last %}, {% endif %}{% endfor %}],
      backgroundColor: ['#28a745', '#ffc107', '#dc3545']
    }]
  };
  new Chart(document.getElementById('statusMonthChart'), {
    type: 'pie',
    data: statusMonthData,
    options: { responsive: true, maintainAspectRatio: false }
  });

  function toggleTheme() {
    const body = document.body;
    const newTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
    body.classList.toggle('dark-mode');
    localStorage.setItem('theme', newTheme);
  }

  window.onload = function () {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }
  };
</script>

{% endblock %}
