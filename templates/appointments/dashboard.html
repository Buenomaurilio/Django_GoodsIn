<!-- Dashboard Template -->
{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
  <div class="row g-3 mb-4">
    <!-- Cards -->
    <div class="col-md-3">
      <div class="card text-bg-primary h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Pallets Today</h5>
          <h2 id="palletsToday">{{ pallets_today }}</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-bg-info h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Pallets This Week</h5>
          <h2 id="palletsWeek">{{ pallets_week }}</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-bg-secondary h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Pallets This Month</h5>
          <h2 id="palletsMonth">{{ pallets_month }}</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-bg-dark h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Total Pallets</h5>
          <h2 id="palletsTotal">{{ pallets_total }}</h2>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Loads by Status (Weekly)</h5>
          <canvas id="statusByWeekChart" height="250"></canvas>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Pallets by Checker (Daily)</h5>
          <canvas id="palletsByCheckerDayChart" height="250"></canvas>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Pallets by Checker (Weekly)</h5>
          <canvas id="palletsByCheckerWeekChart" height="250"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // You’ll replace the placeholders below with actual data via context variables or AJAX
  const statusByWeekData = {{ status_by_week|safe }};
  const checkerDayData = {{ checker_day_data|safe }};
  const checkerWeekData = {{ checker_week_data|safe }};

  const statusByWeekChart = new Chart(
    document.getElementById('statusByWeekChart'), {
      type: 'bar',
      data: statusByWeekData,
      options: { responsive: true, plugins: { legend: { display: true } } }
    });

  const palletsByCheckerDayChart = new Chart(
    document.getElementById('palletsByCheckerDayChart'), {
      type: 'bar',
      data: checkerDayData,
      options: { responsive: true, plugins: { legend: { display: true } } }
    });

  const palletsByCheckerWeekChart = new Chart(
    document.getElementById('palletsByCheckerWeekChart'), {
      type: 'bar',
      data: checkerWeekData,
      options: { responsive: true, plugins: { legend: { display: true } } }
    });
</script>
{% endblock %}
