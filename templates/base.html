<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Appointments{% endblock %}</title>

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-line-icons/css/simple-line-icons.css">

  <style>
    /* Transição suave ao alternar tema */
    body {
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    .dark-mode .bg-light,
    .dark-mode .navbar {
      background-color: #1e1e1e !important;
    }

    .dark-mode .sidebar {
      background-color: #2c2c2e;
    }

    .dark-mode .sidebar .nav-link {
      color: #fff;
    }

    .dark-mode .nav-link.active {
      background-color: #444;
    }

    .dark-mode .card,
    .dark-mode table {
      background-color: #2c2c2e;
      color: #fff;
    }

    .dark-mode .card-title,
    .dark-mode .card-text,
    .dark-mode h2,
    .dark-mode .table th,
    .dark-mode .nav-link {
      color: #fff;
    }

    .dark-mode .table,
    .dark-mode .table th,
    .dark-mode .table td {
      background-color: #2a2a2a !important;
      color: #fff !important;
    }

    .dark-mode .table-striped > tbody > tr:nth-of-type(odd) {
      background-color: #2f2f2f;
    }

    .dark-mode .table-bordered {
      border-color: #444;
    }

    .dark-mode .form-control,
    .dark-mode .form-control-sm {
      background-color: #333 !important;
      color: #fff !important;
      border-color: #555;
    }

    .dark-mode input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .dark-mode input::placeholder {
      color: #ccc;
    }

    .dark-mode .btn {
      color: #fff;
    }

    .dark-mode .content-wrapper {
      background-color: #121212 !important;
      color: #e0e0e0;
    }

    .dark-mode .sticky-top {
      background-color: #1e1e1e !important;
    }

    .dark-mode .alert-primary {
      background-color: #2f3e55 !important;
      color: #ffffff;
    }

    .dark-mode .alert-info {
      background-color: #2b4455 !important;
      color: #ffffff;
    }

    .dark-mode .alert-secondary {
      background-color: #3a3a3a !important;
      color: #ffffff;
    }

    .dark-mode canvas {
      background-color: #2c2c2e !important;
    }

    .toggle-theme-btn {
      background-color: #6c757d;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .toggle-theme-btn:hover {
      background-color: #5a6268;
    }

    .sidebar {
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      padding-top: 56px;
      background-color: #f8f9fa;
    }

    .sidebar .nav-link {
      color: #000;
    }

    .content-wrapper {
      margin-left: 200px;
      padding: 20px;
    }
  </style>
</head>
<body onload="applySavedTheme()">
  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3">
    <a class="navbar-brand mb-4 ps-2" href="#">My App</a>
    <ul class="nav nav-pills flex-column">
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'appointment_list' %}active{% endif %}" href="{% url 'appointment_list' %}">Appointments</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
      </li>
    </ul>
  </div>

  <!-- Content -->
  <div class="content-wrapper">
    <nav class="navbar navbar-expand navbar-light bg-light mb-3 justify-content-end">
      <button onclick="toggleTheme()" class="toggle-theme-btn btn-sm" id="toggleTheme">🌓</button>
    </nav>

    {% block content %}
    {% endblock %}
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    function toggleTheme() {
      const currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.body.classList.remove(`${currentTheme}-mode`);
      document.body.classList.add(`${newTheme}-mode`);
      localStorage.setItem('theme', newTheme);

      // Atualizar gráficos Chart.js se existirem
      if (typeof Chart !== 'undefined') {
        Chart.helpers.each(Chart.instances, function (chart) {
          if (chart) {
            const dark = newTheme === 'dark';
            if (chart.options.plugins?.legend?.labels) {
              chart.options.plugins.legend.labels.color = dark ? '#e0e0e0' : '#000';
            }
            if (chart.options.scales) {
              if (chart.options.scales.x?.ticks) chart.options.scales.x.ticks.color = dark ? '#e0e0e0' : '#000';
              if (chart.options.scales.y?.ticks) chart.options.scales.y.ticks.color = dark ? '#e0e0e0' : '#000';
            }
            chart.update();
          }
        });
      }
    }

    function applySavedTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.body.classList.add(`${saved}-mode`);
    }
  </script>
</body>
</html>
